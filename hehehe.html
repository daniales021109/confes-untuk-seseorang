<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confession Time ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffe5ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .gif-container {
            font-size: 80px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 150px; /* Memberi ruang untuk tombol Yes yang membesar */
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background-color: #38b000;
            color: white;
            box-shadow: 0 5px 15px rgba(56, 176, 0, 0.4);
        }

        #noBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        /* Kelas untuk menyembunyikan tombol setelah selesai */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="emoji" class="gif-container">🥺</div>
        
        <h1 id="question">Aku suka sama kamu, kamu suka ga sama aku? jawab yg jujur ya, jgn bohong <3</h1>
        
        <div class="buttons">
            <button id="yesBtn">Mau! ✨</button>
            <button id="noBtn">Gak 😢</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const emoji = document.getElementById('emoji');
        const question = document.getElementById('question');

        // Menentukan ukuran awal dalam skala (1 = 100%)
        let yesScale = 1;
        let noScale = 1;

        noBtn.addEventListener('click', () => {
            // Tombol Yes membesar (ditambah 0.3 setiap klik)
            yesScale += 0.3;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            // Tombol No mengecil (dikali 0.75 setiap klik agar tidak langsung hilang)
            noScale *= 0.75;
            noBtn.style.transform = `scale(${noScale})`;

            // Opsional: Mengubah emoji biar makin melas tiap ditolak
            if (yesScale > 2) {
                emoji.innerText = "😭";
                question.innerText = "Ih kok tega? aku sih maksa!!";
            }
        });

        yesBtn.addEventListener('click', () => {
            // Efek ketika si dia akhirnya menekan tombol "Mau!"
            emoji.innerText = "🥰❤️🎉";
            question.innerText = "Yeayyy! I Love You sayanggg! 🥰";
            
            // Sembunyikan kedua tombol setelah sukses
            yesBtn.classList.add('hidden');
            noBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
